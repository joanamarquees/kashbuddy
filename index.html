<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.png" />
    <meta name="viewport" content="width=device-width, user-scalable=0, 
        initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0 viewport-fit=cover"/>
    <title>kashbuddy</title>
    <link rel="manifest" href="/manifest.json" />
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #18181b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-in-out, visibility 0.4s;
      }
      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #splash-logo {
        width: 100px;
        height: 100px;
        margin-bottom: 24px;
        animation: pulse 2s infinite ease-in-out;
      }
      #loading-text {
        color: #71717a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body class="bg-zinc-900 text-zinc-50 antialiased overflow-hidden h-dvh">
    <div id="splash-screen">
      <img id="splash-logo" src="/icon.png" alt="kashbuddy logo" />
      <div id="loading-text">loading...</div>
    </div>
    <div id="root" ></div>
    <script type="module" src="/src/index.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, (error) => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
